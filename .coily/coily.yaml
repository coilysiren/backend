# Per-repo command allowlist for backend. Coily is the canonical entry
# point for dev verbs here; the lockdown denies bare uv/docker invocations,
# so operators (human or agent) type `coily <verb>`, not `make build-native`.
#
# Names follow coily's [a-z0-9-] rule. Argv validation rejects shell
# metacharacters at invocation time, so flags forward verbatim through
# coily's user-extras mechanism.

commands:
  build-native:
    run: make build-native
    description: uv lock + uv sync.
  build-docker:
    run: make build-docker
    description: Build the docker image locally with BuildKit cache.
  publish:
    run: make publish
    description: Tag and push the docker image to ghcr.io.
  run-native:
    run: make run-native
    description: Run the FastAPI server with autoreload on port 4000.
  run-docker:
    run: make run-docker
    description: Run the published container locally on port 4000.
  clear-cache:
    run: make clear-cache
    description: Delete cache keys with the given suffix. Args - suffix=<str>.
  bsky-cli:
    run: make bsky-cli
    description: Call a Bluesky XRPC endpoint with caching. Args - path=<str> kwargs=<str>.
  bsky-get-author-feed-texts:
    run: make bsky-get-author-feed-texts
    description: Dump an author's feed texts. Args - handle=<str> pages=<int>.
  bsky-emoji-summary:
    run: make bsky-emoji-summary
    description: Run the emoji-summary NLP job. Args - handle=<str> num_keywords=<int> num_feed_pages=<int>.
  stream-video:
    run: make stream-video
    description: Stream a local video file in fixed-size chunks. Args - path=<str> chunk_size=<int>.

# Catalog metadata for the cross-repo knowledge graph.
# Schema: coilysiren/coilyco-ai#420 (tracker).
catalog:
  kind: Component
  type: library
  system: shared
  owner: kai
  lifecycle: production
  description: "Generic Python backend server template."
  dependsOn: []
  providesApis:
    - python-backend-template
